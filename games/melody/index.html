<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melodia Velvet</title>

<link rel="stylesheet" href="css/melody.css">

</head>


<body>

    <main class="melody">

        <div class="background-blur"></div>


        <div class="scene">

            <img
                id="background"
                src="assets/background.png"
            >

            <img
                id="velvet"
                src="assets/velvet-intro.png"
            >

            <img
                id="velvet-playing"
                src="assets/velvet-playing-1.png"
            >

            <div id="melody-dialog">
                Pośpiewajmy razem...
            </div>

             <div id="music-notes"></div>
             
             <div id="score">
                Wynik: 0
            </div>

            <div id="timer">
                60
            </div>


            <div id="dialog">

                <p>
                Gotowy złapać moją melodię?
                </p>

                <div class="dialog-buttons">
                    <img
                        id="startGame"
                        src="assets/ui/button-yes.png"
                        alt="Tak">


                    <img
                        id="returnGarden"
                        src="assets/ui/button-no.png"
                        alt="Nie">
                </div>

            </div>


        </div>


    </main>

<script src="js/melody.js"></script>

</body>

</html>
